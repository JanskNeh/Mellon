services:
  mellon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mellon
    volumes:
      # Map your host cache to an internal /app/cache folder
      - /home/jeyamir/Mellon/cache:/app/cache
      # If you created the Models folder earlier, keep it too:
      - /home/jeyamir/Mellon/Models:/app/Models
    networks:
      - coolify
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.mellon.rule=Host(`mellon.jeyamir.lab`)"
      - "traefik.http.routers.mellon.entrypoints=http"
      - "traefik.http.services.mellon.loadbalancer.server.port=8088"

networks:
  coolify:
    external: true