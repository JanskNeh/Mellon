services:
  mellon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mellon
    privileged: true
    # This is the exact command to force Mellon to speak to Traefik
    command: uv run main.py --host 0.0.0.0 --port 8088
    ports:
      - '8088:8088'
    volumes:
      - '/home/jeyamir/Mellon/cache:/app/cache'
      - '/home/jeyamir/Mellon/Models:/app/Models'
    dns:
      - 192.168.21.191
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - 'NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display'
      - HF_HOME=/app/cache
      - HF_HUB_CACHE=/app/cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - utility
                - compute
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.mellon.rule=Host(`mellon.jeyamir.lab`)"
      - "traefik.http.routers.mellon.entrypoints=http"
      - "traefik.http.services.mellon.loadbalancer.server.port=8088"
    restart: always

networks:
  coolify:
    external: true