services:
  mellon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mellon
    # ✅ Remove the --host/--port command override, config.ini handles it
    ports:
      - '8088:8088'
    volumes:
      - '/home/jeyamir/Mellon/cache:/app/cache'
      - /home/jeyamir/Mellon/Model:/app/data/models
      # ✅ Optional: mount config.ini so you can edit without rebuilding
      - /home/jeyamir/Mellon/config.ini:/app/config.ini
      - '/home/jeyamir/Mellon/graphs:/app/data/graphs'
    dns:
      - 192.168.21.191
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display
      - HF_HOME=/app/cache
      - HF_HUB_CACHE=/app/cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
                - utility
                - compute
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.mellon.rule=Host(`mellon.jeyamir.lab`)"
      - "traefik.http.routers.mellon.entrypoints=http"
      - "traefik.http.services.mellon.loadbalancer.server.port=8088"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true